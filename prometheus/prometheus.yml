global:
  scrape_interval: 15s
  external_labels:
      monitor: 'my-project'


rule_files:
  - 'alert.rules'

alerting:
  alertmanagers:
  - scheme: http
    static_configs:
    - targets:
      - "alertmanager:9093"


scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
  - job_name: 'blackbox_exporter'
    static_configs:
      - targets: ['blackbox_exporter:9115']
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
  - job_name: 'blackbox'
    metrics_path: /probe
    static_configs:
      - targets:
        - http://prometheus:9090      
        - http://grafana:3000         
        - http://alertmanager:9093     
        - http://loki:3100             
        - http://blackbox_exporter:9115 
        - http://node-exporter:9100  
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115
      - source_labels: [__param_target]
        target_label: url